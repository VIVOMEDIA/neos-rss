#
# RSS feed route: serves document nodes with an ".xml" suffix
# using the "rss.xml" request format
#

-
  name: 'RSS Feed'
  uriPattern: '{node}.xml'
  defaults:
    '@package': 'Neos.Neos'
    '@controller': 'Frontend\Node'
    '@action': 'show'
    '@format': 'rss.xml'
  routeParts:
    'node':
      handler: 'Neos\Neos\Routing\FrontendNodeRoutePartHandlerInterface'
  appendExceedingArguments: true
